<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Línea Gráfica — Finance Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #1e3a8a;
      --blue:    #2563eb;
      --blue-lt: #3b82f6;
      --green:   #059669;
      --green-lt:#10b981;
      --orange:  #d97706;
      --orange-lt:#f59e0b;
      --gray-50: #f8fafc;
      --gray-100:#f1f5f9;
      --gray-200:#e2e8f0;
      --gray-400:#94a3b8;
      --gray-600:#475569;
      --gray-800:#1e293b;
      --white:   #ffffff;
      --grad-main: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #059669 100%);
      --grad-blue: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
      --grad-green:linear-gradient(135deg, #059669 0%, #10b981 100%);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      line-height: 1.6;
    }

    /* ── NAV LATERAL ── */
    .sidenav {
      position: fixed; top: 0; left: 0;
      width: 220px; height: 100vh;
      background: var(--navy);
      display: flex; flex-direction: column;
      padding: 2rem 1.25rem;
      z-index: 100; overflow-y: auto;
    }
    .sidenav-logo { margin-bottom: 2rem; }
    .sidenav-logo img { width: 130px; filter: brightness(0) invert(1); }
    .sidenav a {
      display: block; padding: .5rem .75rem;
      color: rgba(255,255,255,.7);
      text-decoration: none; font-size: .82rem;
      font-weight: 500; border-radius: 6px;
      margin-bottom: .25rem; transition: all .2s;
      border-left: 3px solid transparent;
    }
    .sidenav a:hover, .sidenav a.active {
      color: #fff; background: rgba(255,255,255,.12);
      border-left-color: var(--green-lt);
    }
    .sidenav-section {
      font-size: .7rem; font-weight: 700; letter-spacing: 1px;
      color: rgba(255,255,255,.35); text-transform: uppercase;
      margin: 1.25rem 0 .5rem .75rem;
    }
    .sidenav-footer {
      margin-top: auto; font-size: .72rem;
      color: rgba(255,255,255,.3); padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.1);
    }

    /* ── MAIN ── */
    main { margin-left: 220px; }

    /* ── SECCIONES ── */
    section { padding: 5rem 4rem; }
    section:nth-child(even) { background: var(--white); }
    .section-label {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--grad-green); color: white;
      padding: .3rem .9rem; border-radius: 20px;
      font-size: .78rem; font-weight: 700;
      letter-spacing: .6px; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h2.section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.4rem; font-weight: 800;
      color: var(--navy); line-height: 1.15;
      margin-bottom: 1rem;
    }
    .section-desc {
      font-size: 1.05rem; color: var(--gray-600);
      max-width: 640px; margin-bottom: 3rem;
    }
    .divider {
      width: 56px; height: 4px;
      background: var(--grad-blue);
      border-radius: 2px; margin-bottom: 1.5rem;
    }

    /* ── HERO COVER ── */
    #cover {
      min-height: 100vh; padding: 0;
      background: #060d1e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .cover-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 20% 20%, rgba(37,99,235,.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(5,150,105,.3) 0%, transparent 60%);
    }
    .cover-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .cover-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 2rem;
    }
    .cover-logo-wrap {
      background: #ffffff;
      border-radius: 20px;
      padding: 2rem 3rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
    }
    .cover-logo { width: 280px; display: block; }
    .cover-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,.5);
    }
    .cover-headline {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.5rem; font-weight: 900;
      color: white; line-height: 1.1;
    }
    .cover-headline span {
      background: var(--grad-green);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .cover-sub {
      font-size: 1.1rem; color: rgba(255,255,255,.6);
      max-width: 500px;
    }
    .cover-chips {
      display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center;
    }
    .chip {
      padding: .4rem 1rem; border-radius: 20px;
      font-size: .82rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.8);
      background: rgba(255,255,255,.08);
    }
    .cover-date { font-size: .8rem; color: rgba(255,255,255,.3); margin-top: 1rem; }

    /* ── LOGO SECTION ── */
    .logo-variants {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap: 1.5rem; margin-bottom: 3rem;
    }
    .logo-card {
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .logo-card-bg {
      padding: 3rem 2.5rem; display: flex;
      align-items: center; justify-content: center; min-height: 180px;
    }
    .logo-card-bg.white  { background: #ffffff; border: 1px solid var(--gray-200); }
    .logo-card-bg.navy   { background: var(--navy); }
    .logo-card-bg.blue   { background: var(--blue); }
    .logo-card-bg.green  { background: var(--green); }
    .logo-card-bg.grad   { background: var(--grad-main); }
    .logo-card-bg.light  { background: var(--gray-50); border: 1px solid var(--gray-200); }
    .logo-card-info {
      padding: .875rem 1.25rem;
      background: white;
      border-top: 1px solid var(--gray-100);
    }
    .logo-card-info strong {
      display: block; font-weight: 700; color: var(--navy); font-size: .9rem;
    }
    .logo-card-info span { font-size: .8rem; color: var(--gray-600); }
    .logo-on-dark { filter: brightness(0) invert(1); }
    .logo-card-bg.white .logo-full,
    .logo-card-bg.light .logo-full { width: 220px; }
    .logo-full { width: 200px; }
    .logo-icon-only { width: 80px; }
    .logo-icon-only.inverted { filter: brightness(0) invert(1); }

    /* Área de respeto */
    .clearspace-demo {
      display: flex; align-items: center; justify-content: center;
      padding: 3rem; background: var(--gray-50);
      border: 2px dashed var(--blue-lt); border-radius: 16px;
      position: relative; margin-bottom: 2rem;
    }
    .clearspace-demo img { width: 220px; }
    .clearspace-label {
      position: absolute;
      font-size: .72rem; color: var(--blue); font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .clearspace-label.top    { top: .75rem; left: 50%; transform: translateX(-50%); }
    .clearspace-label.bottom { bottom: .75rem; left: 50%; transform: translateX(-50%); }
    .clearspace-label.left   { left: .75rem; top: 50%; transform: translateY(-50%) rotate(-90deg); }
    .clearspace-label.right  { right: .75rem; top: 50%; transform: translateY(-50%) rotate(90deg); }

    /* ── USO INCORRECTO ── */
    .dont-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 1.25rem;
    }
    .dont-card {
      background: white; border-radius: 14px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .dont-preview {
      height: 130px; display: flex; align-items: center; justify-content: center;
      position: relative; background: var(--gray-50);
    }
    .dont-preview::after {
      content: ''; position: absolute; inset: 0;
      border: 3px solid #ef4444;
      border-radius: 0;
    }
    .dont-x {
      position: absolute; top: .5rem; right: .5rem;
      background: #ef4444; color: white;
      width: 24px; height: 24px;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 800;
      z-index: 1;
    }
    .dont-label {
      padding: .75rem 1rem;
      font-size: .82rem; font-weight: 600;
      color: #991b1b; background: #fff5f5;
      border-top: 1px solid #fee2e2;
    }
    /* Efectos de "mal uso" */
    .dont-stretch { width: 150px; transform: scaleX(1.5); }
    .dont-rotate  { width: 120px; transform: rotate(35deg); }
    .dont-opacity { width: 120px; opacity: .25; }
    .dont-outline { width: 120px; filter: drop-shadow(0 0 0 2px #ef4444) invert(.1); -webkit-text-stroke: 2px red; }
    .dont-colorize{ width: 120px; filter: hue-rotate(90deg); }
    .dont-shadow  { width: 120px; filter: drop-shadow(4px 6px 8px rgba(0,0,0,.7)); }
    .bad-bg-1 { background: repeating-linear-gradient(45deg,#ff6b6b,#ff6b6b 10px,#ffd93d 10px,#ffd93d 20px); }
    .bad-bg-2 { background: linear-gradient(135deg,#f59e0b,#ef4444); }

    /* ── COLORES ── */
    .colors-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 1rem; margin-bottom: 2.5rem;
    }
    .color-swatch {
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,.1);
      cursor: pointer; transition: transform .2s;
    }
    .color-swatch:hover { transform: translateY(-4px); }
    .swatch-color { height: 110px; position: relative; }
    .swatch-color .copy-hint {
      position: absolute; bottom: .5rem; right: .6rem;
      font-size: .65rem; color: rgba(255,255,255,.7);
      font-weight: 600;
    }
    .swatch-info {
      padding: .75rem 1rem; background: white;
    }
    .swatch-name { font-weight: 700; font-size: .88rem; color: var(--navy); display: block; }
    .swatch-hex  { font-size: .8rem; color: var(--gray-600); font-family: 'Courier New', monospace; }
    .swatch-use  { font-size: .72rem; color: var(--gray-400); margin-top: .2rem; display: block; }
    .copied-msg  { display: none; }

    .no-colors-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
      gap: 1rem; margin-top: 1.5rem;
    }
    .no-color-item {
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      position: relative;
    }
    .no-color-strip { height: 70px; }
    .no-color-cross {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 70px;
      display: flex; align-items: center; justify-content: center;
    }
    .no-color-cross svg { width: 36px; height: 36px; }
    .no-color-label {
      background: white; padding: .5rem .75rem;
      font-size: .78rem; font-weight: 600; color: #991b1b;
    }

    /* Gradientes */
    .gradients-row {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 1rem; margin-top: 1.5rem;
    }
    .gradient-card {
      height: 120px; border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      display: flex; align-items: flex-end;
      padding: 1rem; position: relative; overflow: hidden;
    }
    .gradient-card-info { z-index: 1; }
    .gradient-card-info strong { color: white; font-size: .9rem; font-weight: 700; display: block; }
    .gradient-card-info span  { color: rgba(255,255,255,.7); font-size: .75rem; font-family: 'Courier New', monospace; }

    /* ── TIPOGRAFÍA ── */
    .font-demo {
      background: white; border-radius: 16px;
      padding: 2.5rem 3rem; margin-bottom: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      border-left: 4px solid var(--blue);
    }
    .font-name {
      font-size: .75rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--blue); margin-bottom: .5rem;
    }
    .font-demo-headline {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.8rem; font-weight: 800;
      color: var(--navy); line-height: 1.1;
    }
    .font-demo-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem; font-weight: 600;
      color: var(--blue); margin-top: .25rem;
    }
    .font-demo-body {
      font-family: 'Inter', sans-serif;
      font-size: 1rem; color: var(--gray-600);
      margin-top: 1rem; max-width: 520px;
    }
    .font-weights-row {
      display: flex; flex-wrap: wrap; gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .font-weight-item { text-align: center; }
    .font-weight-item .sample {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem; color: var(--navy);
      display: block;
    }
    .font-weight-item .label {
      font-size: .72rem; color: var(--gray-400);
      font-weight: 600; text-transform: uppercase;
    }
    .type-scale { margin-top: 2rem; }
    .type-scale-row {
      display: flex; align-items: baseline; gap: 1.5rem;
      padding: .875rem 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .type-scale-row:last-child { border-bottom: none; }
    .type-meta { width: 120px; flex-shrink: 0; }
    .type-meta .size { font-size: .82rem; color: var(--blue); font-weight: 700; }
    .type-meta .use  { font-size: .72rem; color: var(--gray-400); }
    .type-sample { color: var(--navy); }

    .dont-fonts {
      display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.5rem;
    }
    .dont-font-item {
      background: #fff5f5; border: 1px solid #fca5a5;
      border-radius: 10px; padding: 1rem 1.5rem;
      position: relative;
    }
    .dont-font-item::before {
      content: '✕'; position: absolute; top: .4rem; right: .6rem;
      color: #ef4444; font-weight: 800; font-size: .9rem;
    }
    .dont-font-sample { font-size: 1.4rem; color: #991b1b; }
    .dont-font-name { font-size: .72rem; color: #ef4444; font-weight: 700; display: block; margin-top: .25rem; }

    /* ── VOZ Y TONO ── */
    .voice-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 1.25rem; margin-bottom: 2rem;
    }
    .voice-card {
      background: white; border-radius: 14px;
      padding: 1.5rem; border-left: 4px solid var(--blue);
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .voice-card h4 { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: .5rem; }
    .voice-card p  { font-size: .88rem; color: var(--gray-600); }
    .voice-examples {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1.25rem; margin-top: 1.5rem;
    }
    .voice-ex {
      padding: 1.25rem; border-radius: 12px;
    }
    .voice-ex.good { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .voice-ex.bad  { background: #fff5f5; border: 1px solid #fca5a5; }
    .voice-ex-tag  { font-size: .72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: .5rem; }
    .voice-ex.good .voice-ex-tag { color: var(--green); }
    .voice-ex.bad  .voice-ex-tag { color: #ef4444; }
    .voice-ex p    { font-size: .9rem; }
    .voice-ex.good p { color: #065f46; }
    .voice-ex.bad  p { color: #991b1b; }

    /* ── REDES SOCIALES ── */
    .social-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
      gap: 1.5rem;
    }
    .social-card {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .social-preview {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
      padding: 2rem; position: relative;
    }
    .social-preview .logo-preview { width: 110px; }
    .social-preview h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem; font-weight: 800;
      color: white; text-align: center;
    }
    .social-preview p { font-size: .85rem; color: rgba(255,255,255,.8); text-align: center; }
    .social-preview .tag {
      background: rgba(255,255,255,.15);
      color: white; font-size: .75rem;
      padding: .3rem .8rem; border-radius: 20px;
    }
    .social-meta { padding: 1.25rem; }
    .social-meta h4 { font-size: .95rem; font-weight: 700; color: var(--navy); margin-bottom: .25rem; }
    .social-meta p  { font-size: .82rem; color: var(--gray-600); }
    .social-specs {
      display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem;
    }
    .spec-chip {
      background: var(--gray-100); color: var(--gray-600);
      font-size: .72rem; font-weight: 600;
      padding: .2rem .6rem; border-radius: 6px;
    }

    /* ── TABLA DE REGLAS ── */
    .rules-table {
      width: 100%; border-collapse: collapse;
      margin-top: 1.5rem;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .rules-table th {
      background: var(--navy); color: white;
      padding: 1rem 1.25rem; text-align: left;
      font-size: .85rem; font-weight: 700;
    }
    .rules-table td {
      padding: .875rem 1.25rem;
      font-size: .88rem; color: var(--gray-700, #374151);
      border-bottom: 1px solid var(--gray-100);
      background: white;
    }
    .rules-table tr:last-child td { border-bottom: none; }
    .rules-table tr:hover td { background: var(--gray-50); }
    .tag-ok  { background: #d1fae5; color: #065f46; padding: .2rem .6rem; border-radius: 6px; font-size: .78rem; font-weight: 700; }
    .tag-no  { background: #fee2e2; color: #991b1b; padding: .2rem .6rem; border-radius: 6px; font-size: .78rem; font-weight: 700; }

    /* ── FOOTER ── */
    footer {
      background: #060d1e; color: rgba(255,255,255,.7);
      text-align: center; padding: 3rem 2rem;
      font-size: .88rem;
    }
    footer img { width: 140px; margin-bottom: 1rem; filter: brightness(0) invert(1); }
    footer p { margin-top: .5rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .sidenav { display: none; }
      main { margin-left: 0; }
      section { padding: 3rem 1.5rem; }
      .cover-headline { font-size: 2.5rem; }
    }
    @media (max-width: 600px) {
      .voice-examples { grid-template-columns: 1fr; }
      h2.section-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
